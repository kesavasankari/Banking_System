spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true


# Enable service discovery
spring.cloud.gateway.server.webmvc.discovery.locator.enabled=true
spring.cloud.gateway.server.webmvc.discovery.locator.lower-case-service-id=true

# Auth Service
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AUTHSERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

# Customer Service
spring.cloud.gateway.server.webmvc.routes[1].id=customer-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/customer/**

# Transaction Service
spring.cloud.gateway.server.webmvc.routes[2].id=transaction-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://TRANSACTION-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/transaction/**